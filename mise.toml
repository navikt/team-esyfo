[tools]
java = "temurin-25"
pnpm = "10"

[tasks."wiki:install"]
description = "Install wiki dependencies"
run = "pnpm install"
dir = "docs"
sources = ["package.json", "pnpm-lock.yaml"]
outputs = ["node_modules/.modules.yaml"]

[tasks."wiki:dev"]
description = "Start wiki dev server"
depends = ["wiki:install"]
run = "pnpm dev"
dir = "docs"

[tasks."wiki:build"]
description = "Build wiki for production"
depends = ["wiki:install"]
run = "pnpm build"
dir = "docs"

[tasks."wiki:verify"]
description = "Verify wiki (dead links, build errors)"
depends = ["wiki:build"]
