name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mise.toml'
      - '.github/workflows/build-docs.yaml'
      - '.github/workflows/deploy-docs.yaml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  guard:
    name: Branch guard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Deploying from main"

  build:
    name: Build docs
    needs: guard
    permissions:
      contents: read
      pages: read
    uses: ./.github/workflows/build-docs.yaml
    with:
      deploy: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deployment
