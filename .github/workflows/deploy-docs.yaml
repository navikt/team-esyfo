name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs/package.json'
      - '.github/workflows/build-docs.yaml'
      - '.github/workflows/deploy-docs.yaml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  guard:
    name: Branch guard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "::notice::Branch guard passed for ${GITHUB_REF}"

  build:
    name: Build docs
    needs: guard
    permissions:
      contents: read
      pages: read
    uses: ./.github/workflows/build-docs.yaml
    with:
      deploy: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
