name: Build docs

on:
  workflow_call:
    inputs:
      deploy:
        description: Configure GitHub Pages and upload the Pages artifact
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Effective only when the caller also grants pages: read; reusable workflow
      # permissions are intersected with the caller's permissions.
      pages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: ${{ fromJSON(inputs.deploy && '0' || '1') }} # Full history for VitePress lastUpdated on deploy
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          package_json_file: docs/package.json
      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml
      - if: ${{ inputs.deploy }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Build VitePress
        working-directory: docs
        run: pnpm build
      - if: ${{ inputs.deploy }}
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/.vitepress/dist
