name: Build docs

on:
  workflow_call:
    inputs:
      deploy:
        description: Configure GitHub Pages and upload the Pages artifact
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Effective only when the caller also grants pages: read; reusable workflow
      # permissions are intersected with the caller's permissions.
      pages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ fromJSON(inputs.deploy && '0' || '1') }} # Full history for VitePress lastUpdated on deploy
      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: docs/package.json
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml
      - if: ${{ inputs.deploy }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Build VitePress
        working-directory: docs
        run: pnpm build
      - if: ${{ inputs.deploy }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist
