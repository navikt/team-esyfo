name: CI docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mise.toml'
      - '.github/workflows/build-docs.yaml'
      - '.github/workflows/ci-docs.yaml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    permissions:
      contents: read
    uses: ./.github/workflows/build-docs.yaml
    with:
      deploy: false

  merge-gate:
    name: Merge gate
    needs: [build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          result="build=${{ needs.build.result }}"
          printf '%s\n' "$result"
          case "${{ needs.build.result }}" in
            success) ;;
            cancelled)
              echo "::error::Required job was cancelled: $result"
              exit 1
              ;;
            skipped)
              echo "Accepting skipped job result: $result"
              ;;
            *)
              echo "::error::Required job failed: $result"
              exit 1
              ;;
          esac
