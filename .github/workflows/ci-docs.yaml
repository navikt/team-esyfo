name: CI docs

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@1648a78a9c255c6a277ba90b18bfddbac41e3881 # v4.0.1
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Build VitePress
        working-directory: docs
        run: pnpm build

  merge-gate:
    name: Merge gate
    needs: [build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          result="build=${{ needs.build.result }}"
          printf '%s\n' "$result"
          case "${{ needs.build.result }}" in
            success) ;;
            cancelled)
              echo "::error::Required job was cancelled: $result"
              exit 1
              ;;
            skipped)
              echo "Accepting skipped job result: $result"
              ;;
            *)
              echo "::error::Required job failed: $result"
              exit 1
              ;;
          esac
